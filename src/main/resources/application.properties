spring.application.name=MessageRoute

#MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

#ARTEMIS
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=${ARTEMIS_USER}
spring.artemis.password=${ARTEMIS_PASSWORD}


#CONFIG
spring.config.import=file:./.env[.properties]

#MESSAGE ENDPOINTS
inbound.jms-uri=jms:queue:CUSTOMER.IN
inbound.file-uri=file:messages/inbox?include=.*\\.json&readLock=changed&delete=true


