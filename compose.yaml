services:
  mysql:
    image: mysql:latest
    container_name: 'db'
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-CustomerRoute}
      MYSQL_USER: ${MYSQL_USER:-demo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-demo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-superdemo}
    ports:
      - '3306:3306'
  artemis:
    image: apache/activemq-artemis:latest
    container_name: 'message_route'
    environment:
      ARTEMIS_USER: ${ARTEMIS_USER:-demo}
      ARTEMIS_PASSWORD: ${ARTEMIS_PASSWORD:-demo}
    ports:
      - "8161:8161"
      - "61616:61616"
    volumes:
      - ./artemis-data:/var/lib/artemis/data



